<div class="flex flex-col h-full p-4">
  @if (error$ | async; as error) {
    <div class="flex-shrink-0 text-[var(--mat-error-default,#b00020)] mb-4">
      {{ error }}
    </div>
  }

  @if (loading$ | async) {
    <div class="flex flex-1 justify-center items-center p-8">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  } @else {
    <div class="flex flex-1 min-h-0 overflow-auto">
      <table
        mat-table
        [dataSource]="(filteredDevices$ | async) ?? []"
        class="w-full device-list-table"
      >
        <ng-container matColumnDef="image">
          <th mat-header-cell *matHeaderCellDef>イメージ</th>
          <td mat-cell *matCellDef="let row">
            <img
              [src]="row.image"
              [alt]="row.deviceName"
              class="w-12 h-12 object-cover rounded"
            />
          </td>
        </ng-container>
        <ng-container matColumnDef="deviceName">
          <th mat-header-cell *matHeaderCellDef>デバイス名</th>
          <td mat-cell *matCellDef="let row">{{ row.deviceName }}</td>
        </ng-container>
        <ng-container matColumnDef="tag">
          <th mat-header-cell *matHeaderCellDef>タグ</th>
          <td mat-cell *matCellDef="let row">{{ row.tag }}</td>
        </ng-container>
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>カテゴリ</th>
          <td mat-cell *matCellDef="let row">{{ row.category }}</td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>説明</th>
          <td mat-cell *matCellDef="let row">{{ row.description }}</td>
        </ng-container>

        <tr
          mat-header-row
          *matHeaderRowDef="displayedColumns; sticky: true"
        ></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          (click)="navigateToDetail(row.id)"
          class="cursor-pointer"
        ></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayedColumns.length">
            デバイスがありません。
          </td>
        </tr>
      </table>
    </div>
  }
</div>
