<div class="flex flex-col h-full p-4">
  @if (error$ | async; as error) {
    <div class="flex-shrink-0 text-[var(--mat-error-default,#b00020)] mb-4">
      {{ error }}
    </div>
  }

  @if (loading$ | async) {
    <div class="flex flex-1 justify-center items-center p-8">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  } @else {
    <div class="flex flex-1 min-h-0 overflow-auto flex flex-col">
      <choh-device-list-header />
      @let devices = filteredDevices$ | async;
      @if (devices && devices.length > 0) {
        @for (device of devices; track device.id) {
          <choh-device-list-item [device]="device" />
        }
      } @else {
        <div class="flex flex-1 items-center justify-center p-8 text-gray-500">
          デバイスがありません。
        </div>
      }
    </div>
  }
</div>
