<div class="device-list-item" (click)="navigateToDetail()" role="button" tabindex="0">
  <div class="device-list-item__cell device-list-item__cell--image">
    <img
      [src]="device().image"
      [alt]="device().deviceName"
      class="device-list-item__image"
    />
  </div>
  <div class="device-list-item__cell device-list-item__cell--deviceName">{{ device().deviceName }}</div>
  <div class="device-list-item__cell device-list-item__cell--tag">{{ device().tag }}</div>
  <div class="device-list-item__cell device-list-item__cell--category">{{ device().category }}</div>
  <div class="device-list-item__cell device-list-item__cell--description">{{ device().description }}</div>
</div>
