name: Sync devices from partslist.csv

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync devices
        run: pnpm nx run sync-devices:sync

      - name: Get branch name
        id: branch
        run: echo "name=chore/sync-devices-$(date +%Y-%m-%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ steps.branch.outputs.name }}
          add-paths: apps/web/public/devices.json
          delete-branch: true
          commit-message: |
            chore(sync-devices): update devices.json from partslist.csv
            Auto-generated by sync-devices workflow
          title: "chore(sync-devices): update devices.json from partslist.csv"
          body: |
            ## Summary
            partslist.csv から devices.json を自動生成しました。

            ## Type of change
            - [x] Chore (build/test/ci)

            ## Related issues
            - Part of #118

            ## What changed?
            - apps/web/public/devices.json を partslist.csv の最新データで更新

            ## How to test
            1. ビルドが通ることを確認
            2. デバイス一覧が正しく表示されることを確認

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
