<div class="flex flex-col flex-1 min-h-0 overflow-hidden">
  <div
    class="flex-shrink-0 flex items-center justify-between gap-4 py-2 px-4 border-b border-black/12 dark:border-white/12"
  >
    <mat-form-field appearance="outline" class="flex-1 max-w-96">
      <mat-label>検索</mat-label>
      <input
        matInput
        [ngModel]="query()"
        (ngModelChange)="onQueryChange($event)"
        placeholder="名前・タグ・カテゴリ・説明"
      />
    </mat-form-field>
    <mat-button-toggle-group
      [value]="viewMode()"
      (valueChange)="setViewMode($event)"
      aria-label="表示形式"
    >
      <mat-button-toggle value="table">テーブル表示</mat-button-toggle>
      <mat-button-toggle value="card">カード表示</mat-button-toggle>
    </mat-button-toggle-group>
  </div>
  <div class="flex flex-1 min-h-0 overflow-hidden flex flex-col">
    @if (viewMode() === 'table') {
      <choh-device-list />
    } @else {
      <choh-device-card-list />
    }
  </div>
</div>
